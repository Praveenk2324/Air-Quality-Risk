stages:
  fetch:
    cmd: python -m src.data.fetch --lat 12.9716 --lon 77.5946 --radius 25000 --city Bengaluru
    deps:
      - src/data/fetch.py
    outs:
      - data/raw/latest.csv
    
  preprocess:
    cmd: python -m src.data.preprocess
    deps:
      - src/data/preprocess.py
      - data/raw/latest.csv
    outs:
      - data/processed/train.csv
      - data/processed/val.csv
      - data/processed/test.csv
      - data/processed/scaler.pkl