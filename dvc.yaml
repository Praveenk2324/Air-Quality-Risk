stages:
  fetch:
    cmd: python -m src.data.fetch --lat 12.9716 --lon 77.5946 --radius 25000 --city Bengaluru
    deps:
      - src/data/fetch.py
    outs:
      - data/raw/latest.csv
    
  preprocess:
    cmd: python -m src.data.preprocess
    deps:
      - src/data/preprocess.py
      - data/raw/latest.csv
    outs:
      - data/processed/train.csv
      - data/processed/val.csv
      - data/processed/test.csv
      - data/processed/scaler.pkl
  
  train:
    cmd: python -m src.model.train --lr 1e-3 --hidden 128 64 --dropout 0.3 --epochs 30
    deps:
      - src/model/train.py
      - src/model/mlp.py
      - data/processed/train.csv
      - data/processed/val.csv
      - data/processed/scaler.pkl
    outs:
      - models/best_model.pt
    metrics:
      - metrics/train_metrics.json:
          cache: false